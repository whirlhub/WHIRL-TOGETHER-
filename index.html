<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whirl Together</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box;
      scroll-behavior: smooth; 
    }
    
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(180deg, #0a0a0f 0%, #141421 100%);
      color: #fff;
      text-align: center;
      line-height: 1.6;
    }

    nav {
      position: sticky;
      top: 0;
      background: rgba(10, 10, 15, 0.9);
      backdrop-filter: blur(10px);
      padding: 15px;
      border-bottom: 1px solid #2a2a3a;
      z-index: 100;
    }
    
    nav a {
      color: #a1a1aa;
      text-decoration: none;
      margin: 0 12px;
      font-size: 15px;
      font-weight: 500;
      transition: 0.2s;
    }
    
    nav a:hover { 
      color: #00d4ff; 
      text-shadow: 0 0 10px #00d4ff;
    }

    .hero {
      padding: 100px 20px 80px;
    }
    
    h1 {
      font-size: 56px;
      background: linear-gradient(90deg, #7b5cff, #00d4ff, #7b5cff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 3s linear infinite;
      margin-bottom: 15px;
    }
    
    @keyframes shine {
      to { background-position: 200% center; }
    }
    
    h2 { 
      font-size: 36px; 
      margin-bottom: 15px;
      color: #fff;
    }
    
    p.subtitle {
      font-size: 18px;
      color: #a1a1aa;
      margin-bottom: 30px;
    }
    
    .btn {
      display: inline-block;
      padding: 14px 32px;
      margin: 10px 8px;
      background: #7b5cff;
      color: white;
      text-decoration: none;
      border-radius: 50px;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(123, 92, 255, 0.3);
    }
    
    .btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 25px rgba(123, 92, 255, 0.5);
    }
    
    .btn-tiktok { 
      background: linear-gradient(90deg, #ff0050, #00f2ea);
      box-shadow: 0 4px 15px rgba(255, 0, 80, 0.3);
    }
    
    .btn-facebook { 
      background: #1877f2;
      box-shadow: 0 4px 15px rgba(24, 119, 242, 0.3);
    }
    
    .btn-green { 
      background: linear-gradient(90deg, #22c55e, #16a34a);
      box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
    }
    
    .btn-gold { 
      background: linear-gradient(90deg, #facc15, #f59e0b); 
      color: #0a0a0f; 
      font-weight: 700;
      box-shadow: 0 4px 15px rgba(250, 204, 21, 0.4);
    }
    
    .section {
      padding: 80px 20px;
      max-width: 1000px;
      margin: 0 auto;
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
