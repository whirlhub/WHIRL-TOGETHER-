<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whirl Together</title>
  <style>
    * { scroll-behavior: smooth; }
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0f;
      color: #fff;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    nav {
      position: sticky;
      top: 0;
      background: #0a0a0f;
      padding: 15px;
      border-bottom: 1px solid #2a2a3a;
      z-index: 100;
    }
    nav a {
      color: #a1a1aa;
      text-decoration: none;
      margin: 0 12px;
      font-size: 15px;
      transition: 0.2s;
    }
    nav a:hover { color: #00d4ff; }
   .hero {
      padding: 80px 20px 60px;
    }
    h1 {
      font-size: 48px;
      background: linear-gradient(90deg, #7b5cff, #00d4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    h2 { font-size: 32px; margin-bottom: 10px; }
   .btn {
      display: inline-block;
      padding: 14px 30px;
      margin: 10px 8px;
      background: #7b5cff;
      color: white;
      text-decoration: none;
      border-radius: 30px;
      transition: 0.2s;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }
   .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(123, 92, 255, 0.4);
    }
   .btn-tiktok { background: linear-gradient(90deg, #ff0050, #00f2ea); }
   .btn-facebook { background: #1877f2; }
   .btn-green { background: #22c55e; }
   .btn-gold { background: linear-gradient(90deg, #facc15, #f59e0b); color: #0a0a0f; font-weight: bold; }
   .section {
      padding: 60px 20px;
      max-width: 900px;
      margin: 0 auto;
    }
   .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
   .card {
      background: #15151f;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #2a2a3a;
    }
   .card h3 { color: #00d4ff; margin-top: 0; }
   .quote-box, .joke-box, .sponsor-box {
      background: #15151f;
      padding: 30px;
      border-radius: 12px;
      border: 1px solid #2a2a3a;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1.6;
      flex-direction: column;
    }
    a { color: #00d4ff; }
   .note { color: #a1a1aa; font-size: 0.95rem; }
   .music-box {
      background: #15151f;
      padding: 25px;
      border-radius: 12px;
      border: 1px solid #2a2a3a;
      max-width: 500px;
      margin: 0 auto;
    }
    input[type="file"] {
      color: #a1a1aa;
      margin-bottom: 15px;
    }
    audio { width: 100%; margin-top: 10px; }
  </style>
</head>
