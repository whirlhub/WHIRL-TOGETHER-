<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whirl Together</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0f;
      color: #fff;
      margin: 0;
      padding: 0;
      text-align: center;
    }
  .hero {
      padding: 100px 20px 60px;
    }
    h1 {
      font-size: 48px;
      background: linear-gradient(90deg, #7b5cff, #00d4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  .btn {
      display: inline-block;
      padding: 14px 30px;
      margin: 10px 8px;
      background: #7b5cff;
      color: white;
      text-decoration: none;
      border-radius: 30px;
      transition: 0.2s;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }
  .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(123, 92, 255, 0.4);
    }
  .btn-tiktok {
      background: linear-gradient(90deg, #ff0050, #00f2ea);
    }
  .btn-facebook {
      background: #1877f2;
    }
  .section {
      padding: 60px 20px;
      max-width: 900px;
      margin: 0 auto;
    }
  .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
  .card {
      background: #15151f;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #2a2a3a;
    }
  .card h3 {
      color: #00d4ff;
      margin-top: 0;
    }
    a {
      color: #00d4ff;
    }
  .note {
      color: #a1a1aa;
      font-size: 0.95rem;
    }
  .music-box {
      background: #15151f;
      padding: 25px;
      border-radius: 12px;
      border: 1px solid #2a2a3a;
      max-width: 500px;
      margin: 0 auto;
    }
    input[type="file"] {
      color: #a1a1aa;
      margin-bottom: 15px;
    }
    audio {
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Whirl Together</h1>
    <p>Connecting talent with opportunities and sponsors</p>
    <a href="https://chat.whatsapp.com/J0pSLuqKUsTFxYoat4lJbj" target="_blank" class="btn">Join WhatsApp Group</a>
    <a href="https://www.tiktok.com/@whirltogetherforever" target="_blank" class="btn btn-tiktok">Follow on TikTok</a>
    <a href="https://www.facebook.com/profile.php?id=61589247127526" target="_blank" class="btn btn-facebook">Follow on Facebook</a>
  </div>

  <div class="section" id="music">
    <h2>Play Music</h2>
    <div class="music-box">
      <p class="note">Pick a song from your phone and play it here</p>
      <input type="file" id="musicFile" accept="audio/*">
      <audio id="player" controls></
